<html lang="es">
<head>

<style>
body { background:#0b1220; color:#fff; font-family:sans-serif; margin:0; padding:0; }

.secondary { background:#1f2a44; color:#fff; }
.notice { font-size:14px; color:#9bb0c8; margin-top:10px; }
.iab-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; padding:20px; }
.iab-box { background:#06101c; padding:20px; border-radius:12px; max-width:400px; text-align:center; }

  </style>

</head>
<body>
<div class="wrap">
<img src="icon-192.png" alt="Logo" class="logo">
<h1>Descarga e instala nuestro APK</h1>
<a href="https://cold-eu-agl-1.gofile.io/download/direct/fda2be75-dd25-4e30-9bf5-5ad1ada341b1/FutbolLive.apk" class="btn primary">Descargar APK</a>
<h2>Abrir en Chrome</h2>
<input id="urlBox" class="copy" value="http://futbollive.netlify.app" readonly>
<a href="#" id="openChrome" class="btn secondary">Abrir en Chrome</a>
<p class="notice" style="font-size:200%; color:#ffcc00; font-weight:bold;">Si usas Facebook o Instagram, copia el enlace y ábrelo manualmente en Chrome.</p>
</div>

<div id="iab" class="iab-overlay">
  <div class="iab-box">
    <h2>Abrir en Chrome</h2>
    <input id="iabInput" class="copy" value="https://minhacrome.com" readonly>
    <a href="#" id="iabOpen" class="btn primary">Abrir en Chrome (Android)</a>
    <a href="#" id="iabCopy" class="btn secondary">Copiar URL</a>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

const isIAB = /FBAN|FBAV|FB_IAB|Instagram/i.test(navigator.userAgent);
if (isIAB) document.getElementById('iab').style.display = 'flex';

function chromeIntent(url) {
  const a = document.createElement('a');
  a.href = 'intent://' + url.replace(/^https?:\/\//,'') + '#Intent;scheme=https;package=com.android.chrome;end';
  document.body.appendChild(a); a.click(); a.remove();
}
document.getElementById('openChrome').addEventListener('click', e=>{ e.preventDefault(); navigator.clipboard.writeText(document.getElementById('urlBox').value).then(()=>alert('URL copiada correctamente')); chromeIntent(document.getElementById('urlBox').value); });
document.getElementById('iabOpen').addEventListener('click', e=>{ e.preventDefault(); navigator.clipboard.writeText(document.getElementById('iabInput').value).then(()=>alert('URL copiada correctamente')); chromeIntent(document.getElementById('iabInput').value); });
document.getElementById('iabCopy').addEventListener('click', e=>{ e.preventDefault(); navigator.clipboard.writeText(document.getElementById('iabInput').value); alert('Enlace copiado'); });
</script>
